<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESP等级认证OJ系统 - 封面</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body {background:#f0f0f0;}
        .cover-container {max-width:1200px;margin:0 auto;padding:20px;text-align:center;}
        /* 海报样式 */
        .poster {width:100%;max-width:800px;margin:0 auto;border-radius:8px;box-shadow:0 0 15px rgba(0,0,0,0.2);}
        /* 选择区域 */
        .select-area {margin:30px 0;padding:20px;background:#fff;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
        .select-area h2 {color:#333;margin-bottom:20px;}
        .form-group {margin:15px 0;}
        .form-group label {display:block;font-size:18px;color:#555;margin-bottom:8px;text-align:left;width:80%;margin:0 auto 8px;}
        .form-group select, .form-group input {width:80%;padding:12px;font-size:16px;border:1px solid #ddd;border-radius:4px;}
        /* 倒计时样式 */
        .countdown {margin:20px 0;font-size:24px;color:#e63946;font-weight:bold;}
        .countdown .disabled {color:#999;font-weight:normal;}
        /* 限时提示样式 */
        .time-limit-info {background:#e3f2fd;padding:15px;border-radius:8px;margin:20px auto;width:80%;text-align:left;}
        .time-limit-info h3 {color:#1976d2;margin-bottom:10px;}
        .time-limit-info ul {list-style:none;padding-left:0;}
        .time-limit-info li {padding:8px;border-bottom:1px solid #bbdefb;}
        .time-limit-info li:last-child {border-bottom:none;}
        .time-limit-info .active {color:#2e7d32;font-weight:bold;}
        .time-limit-info .expired {color:#c62828;}
        .time-limit-info .pending {color:#f57c00;}
        /* 按钮样式 */
        .enter-btn {padding:15px 40px;background:#007bff;color:#fff;border:none;border-radius:6px;font-size:18px;cursor:pointer;margin-top:20px;}
        .enter-btn:disabled {background:#6c757d;cursor:not-allowed;}
        .enter-btn:hover:not(:disabled) {background:#0056b3;}
        /* 管理员入口 */
        .admin-link {margin-top:30px;font-size:16px;}
        .admin-link a {color:#007bff;text-decoration:none;}
        .admin-link a:hover {text-decoration:underline;}
    </style>
</head>
<body>
    <div class="cover-container">
        <!-- 展示指定海报 -->
        <img src="https://cdn.luogu.com.cn/upload/image_hosting/mwkwi8zh.png" alt="GESP等级认证海报" class="poster">

        <!-- 语言/等级选择区域 -->
        <div class="select-area">
            <h2>GESP等级认证 - 考试入口</h2>

            <!-- 限时规则显示 -->
            <div class="time-limit-info" id="timeLimitInfo">
                <h3>⏰ 考试时间安排</h3>
                <div id="timeLimitList">加载时间安排中...</div>
            </div>

            <div class="form-group">
                <label for="languageSelect">选择考试语言：</label>
                <select id="languageSelect" disabled>
                    <option value="">请等待配置加载...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="levelSelect">选择考试等级：</label>
                <select id="levelSelect" disabled>
                    <option value="">请等待配置加载...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="usernameInput">输入考生姓名：</label>
                <input type="text" id="usernameInput" placeholder="请输入你的姓名" disabled>
            </div>

            <!-- 考试倒计时 -->
            <div class="countdown" id="countdown">
                考试开始倒计时：加载中...
            </div>

            <!-- 进入答题页按钮 -->
            <button class="enter-btn" id="enterBtn" disabled>
                进入考试
            </button>
        </div>

        <!-- 管理员入口 -->
        <div class="admin-link">
            <a href="admin.html">管理员后台入口</a>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let config = {};
        let timeLimits = []; // 限时规则
        let examStartTime = null;
        let countdownTimer = null;
        let currentLanguage = '';
        let currentLevel = 0;

        // ==================== 初始化页面 ====================
        function initPage() {
            // 加载系统配置
            loadScript('config.js', () => {
                config = window.ojConfig || {};
                
                // 初始化语言选择框
                initLanguageSelect();
                
                // 初始化等级选择框
                initLevelSelect();
                
                // 启用输入框
                document.getElementById('languageSelect').disabled = false;
                document.getElementById('levelSelect').disabled = false;
                document.getElementById('usernameInput').disabled = false;
                
                // 初始化考试开始时间
                examStartTime = new Date(config.examStartTime || new Date().toString());
                
                // 启动倒计时
                startCountdown();
                
                // 监听按钮点击
                document.getElementById('enterBtn').addEventListener('click', enterExam);
                
                // 监听语言和等级变化
                document.getElementById('languageSelect').addEventListener('change', checkTimeLimit);
                document.getElementById('levelSelect').addEventListener('change', checkTimeLimit);
            });

            // 加载限时规则
            loadTimeLimits();
        }

        // ==================== 初始化下拉框 ====================
        function initLanguageSelect() {
            const langSelect = document.getElementById('languageSelect');
            langSelect.innerHTML = '';
            const enabledLangs = config.enabledLanguages || [];
            
            if (enabledLangs.length === 0) {
                langSelect.innerHTML = '<option value="">暂无可用语言</option>';
            } else {
                enabledLangs.forEach(lang => {
                    langSelect.innerHTML += `<option value="${lang}">${lang}</option>`;
                });
            }
        }

        function initLevelSelect() {
            const levelSelect = document.getElementById('levelSelect');
            levelSelect.innerHTML = '';
            const enabledLevels = config.enabledLevels || [];
            
            if (enabledLevels.length === 0) {
                levelSelect.innerHTML = '<option value="">暂无可用等级</option>';
            } else {
                enabledLevels.sort((a, b) => a - b);
                enabledLevels.forEach(level => {
                    levelSelect.innerHTML += `<option value="${level}">${level}级</option>`;
                });
            }
        }

        // ==================== 限时规则相关 ====================
        function loadTimeLimits() {
            // 先尝试加载 timeLimits.js
            loadScript('timeLimits.js', () => {
                timeLimits = window.ojTimeLimits || [];
                renderTimeLimits();
                checkTimeLimit();
            }, () => {
                // 如果 timeLimits.js 不存在，使用空数组
                timeLimits = [];
                renderTimeLimits();
            });
        }

        function renderTimeLimits() {
            const container = document.getElementById('timeLimitList');
            
            if (timeLimits.length === 0) {
                container.innerHTML = '<p>暂无特殊限时规则，以系统倒计时为准</p>';
                return;
            }

            // 按时间排序
            timeLimits.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));
            
            let html = '<ul>';
            const now = new Date();
            
            timeLimits.forEach(limit => {
                const start = new Date(limit.startTime);
                const end = new Date(limit.endTime);
                
                let status = 'pending';
                let statusText = '未开始';
                let statusClass = 'pending';
                
                if (now >= start && now <= end) {
                    status = 'active';
                    statusText = '进行中';
                    statusClass = 'active';
                } else if (now > end) {
                    status = 'expired';
                    statusText = '已结束';
                    statusClass = 'expired';
                }
                
                const languageText = limit.language === 'all' ? '全部语言' : limit.language;
                const levelText = limit.level === 'all' ? '全部等级' : `${limit.level}级`;
                
                html += `
                    <li class="${statusClass}">
                        <strong>${limit.description}</strong><br>
                        ${limit.startTime.replace('T', ' ')} 至 ${limit.endTime.replace('T', ' ')}<br>
                        适用：${languageText}，${levelText} (${statusText})
                    </li>
                `;
            });
            
            html += '</ul>';
            container.innerHTML = html;
        }

        function checkTimeLimit() {
            const language = document.getElementById('languageSelect').value;
            const level = document.getElementById('levelSelect').value;
            const enterBtn = document.getElementById('enterBtn');
            
            if (!language || !level) return;
            
            const now = new Date();
            let canEnter = false;
            let message = '';

            // 检查是否有匹配的限时规则
            const matchingLimits = timeLimits.filter(limit => {
                const langMatch = limit.language === 'all' || limit.language === language;
                const levelMatch = limit.level === 'all' || parseInt(limit.level) === parseInt(level);
                return langMatch && levelMatch;
            });

            if (matchingLimits.length > 0) {
                // 有专门的限时规则
                for (const limit of matchingLimits) {
                    const start = new Date(limit.startTime);
                    const end = new Date(limit.endTime);
                    
                    if (now >= start && now <= end) {
                        canEnter = true;
                        message = `✅ 当前在考试时间内：${limit.description}`;
                        break;
                    }
                }
                
                if (!canEnter) {
                    message = '❌ 当前不在该语言/等级的考试时间内';
                }
            } else {
                // 没有专门的限时规则，使用系统倒计时
                const diff = examStartTime - now;
                if (diff <= 0) {
                    canEnter = true;
                    message = '✅ 系统考试已开始';
                } else {
                    message = '⏳ 等待系统考试开始';
                }
            }

            // 更新按钮状态
            enterBtn.disabled = !canEnter;
            
            // 显示提示信息（可以在页面上加一个提示区域）
            let tipDiv = document.getElementById('timeLimitTip');
            if (!tipDiv) {
                tipDiv = document.createElement('div');
                tipDiv.id = 'timeLimitTip';
                tipDiv.style.margin = '10px auto';
                tipDiv.style.padding = '10px';
                tipDiv.style.borderRadius = '4px';
                tipDiv.style.width = '80%';
                document.querySelector('.select-area').insertBefore(tipDiv, document.getElementById('enterBtn'));
            }
            
            tipDiv.innerHTML = message;
            tipDiv.style.background = canEnter ? '#d4edda' : '#f8d7da';
            tipDiv.style.color = canEnter ? '#155724' : '#721c24';
        }

        // ==================== 倒计时 ====================
        function startCountdown() {
            const countdownEl = document.getElementById('countdown');
            const enterBtn = document.getElementById('enterBtn');

            updateCountdown();
            countdownTimer = setInterval(updateCountdown, 1000);

            function updateCountdown() {
                const now = new Date();
                const diff = examStartTime - now;
            
                if (diff <= 0) {
                    countdownEl.innerHTML = '✅ 考试已开始！可以进入答题';
                    // 👇 强制启用按钮（不管限时规则）
                    document.getElementById('enterBtn').disabled = false;
                    clearInterval(countdownTimer);
                } else {
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    countdownEl.innerHTML = `考试开始倒计时：${hours}小时${minutes}分${seconds}秒`;
                    // 👇 倒计时期间禁用按钮
                    document.getElementById('enterBtn').disabled = true;
                }
            }
        }

        // ==================== 进入考试 ====================
        function enterExam() {
            const username = document.getElementById('usernameInput').value.trim();
            const language = document.getElementById('languageSelect').value;
            const level = document.getElementById('levelSelect').value;
        
            if (!username) {
                alert('请输入考生姓名！');
                return;
            }
            if (!language) {
                alert('请选择考试语言！');
                return;
            }
            if (!level) {
                alert('请选择考试等级！');
                return;
            }
        
            // 👇 注释掉限时检查（直接用系统时间）
            // const now = new Date();
            // if (now < examStartTime) {
            //     alert('考试还未开始！');
            //     return;
            // }
        
            const examUrl = `exam.html?username=${encodeURIComponent(username)}&language=${encodeURIComponent(language)}&level=${encodeURIComponent(level)}`;
            window.location.href = examUrl;
        }

        // ==================== 通用工具 ====================
        function loadScript(src, callback, errorCallback) {
            const oldScripts = document.querySelectorAll(`script[src*="${src}"]`);
            oldScripts.forEach(script => script.remove());

            const script = document.createElement('script');
            script.src = src + '?rand=' + Math.random();
            script.type = 'text/javascript';
            script.charset = 'UTF-8';
            script.onload = callback;
            script.onerror = () => {
                if (errorCallback) {
                    errorCallback();
                } else {
                    console.log(`加载${src}失败，可能文件不存在`);
                }
            };
            document.body.appendChild(script);
        }

        // 页面加载时初始化
        window.onload = initPage;
    </script>
</body>
</html>
