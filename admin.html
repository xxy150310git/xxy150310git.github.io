<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESP等级认证OJ系统 - 管理员后台</title>
    <style>
        * {margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body {background:#f0f0f0;padding:20px;}
        .admin-container {max-width:1200px;margin:0 auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
        h1 {text-align:center;color:#333;margin-bottom:30px;}
        /* 登录区域 */
        .login-area,.manage-area {display:none;}
        .active {display:block;}
        .form-group {margin-bottom:15px;}
        label {display:block;margin-bottom:8px;color:#333;font-weight:bold;}
        input,select,textarea,button {width:100%;padding:12px;font-size:16px;border:1px solid #ddd;border-radius:4px;}
        textarea {min-height:100px;resize:vertical;}
        button {background:#007bff;color:#fff;border:none;cursor:pointer;margin:5px 0;}
        button:hover {background:#0056b3;}
        .btn-success {background:#28a745;}
        .btn-success:hover {background:#218838;}
        .btn-danger {background:#dc3545;}
        .btn-danger:hover {background:#c82333;}
        .btn-warning {background:#ffc107;color:#212529;}
        .btn-warning:hover {background:#ffca2c;}
        /* 标签页样式 */
        .tab-nav {display:flex;border-bottom:1px solid #ddd;margin:20px 0;}
        .tab-nav button {width:auto;padding:10px 20px;border:none;background:none;color:#666;border-bottom:2px solid transparent;}
        .tab-nav button.active {color:#007bff;border-bottom-color:#007bff;font-weight:bold;}
        .tab-content {display:none;margin:20px 0;}
        .tab-content.active {display:block;}
        /* 复选框组 */
        .checkbox-group {display:flex;flex-wrap:wrap;gap:15px;margin:10px 0;}
        .checkbox-item {display:flex;align-items:center;width:auto;}
        .checkbox-item input {width:auto;margin-right:8px;}
        /* 表格样式 */
        table {width:100%;border-collapse:collapse;margin:20px 0;}
        th,td {padding:12px;text-align:left;border-bottom:1px solid #ddd;}
        th {background:#f8f9fa;}
        .no-data {color:#999;text-align:center;padding:20px;}
        /* 文件上传 */
        .upload-area {padding:20px;border:1px dashed #ddd;border-radius:6px;text-align:center;margin:20px 0;}
        .upload-area input {width:auto;display:inline-block;}
        /* 选项输入区域 */
        .options-area {margin:10px 0;}
        .option-input {display:flex;gap:10px;margin:5px 0;}
        .option-input input {flex:1;}
        .option-input button {width:auto;padding:8px 12px;}
        /* 限时设置区域 */
        .time-limit-group {margin:20px 0;padding:15px;background:#f8f9fa;border-radius:6px;border-left:4px solid #007bff;}
        .time-limit-row {display:flex;gap:10px;margin-bottom:10px;align-items:center;}
        .time-limit-row input {flex:1;}
        .time-limit-row button {width:auto;padding:8px 15px;margin:0;}
        .time-limit-item {background:#fff;padding:10px;border:1px solid #ddd;border-radius:4px;margin-bottom:10px;}
        .time-limit-header {display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
        .time-limit-header h4 {margin:0;}
        .status-badge {padding:4px 10px;border-radius:20px;font-size:14px;font-weight:normal;}
        .status-active {background:#d4edda;color:#155724;}
        .status-expired {background:#f8d7da;color:#721c24;}
        .status-pending {background:#fff3cd;color:#856404;}
    </style>
</head>
<body>
    <div class="admin-container">
        <h1>GESP等级认证OJ系统 - 管理员后台</h1>

        <!-- 登录区域 -->
        <div class="login-area active" id="loginArea">
            <div class="form-group">
                <label for="adminAccount">管理员账号</label>
                <input type="text" id="adminAccount" placeholder="请输入账号">
            </div>
            <div class="form-group">
                <label for="adminPwd">管理员密码</label>
                <input type="password" id="adminPwd" placeholder="请输入密码">
            </div>
            <button onclick="adminLogin()">登录</button>
        </div>

        <!-- 管理区域 -->
        <div class="manage-area" id="manageArea">
            <!-- 标签导航 -->
            <div class="tab-nav">
                <button class="active" onclick="switchTab('configTab')">系统配置</button>
                <button onclick="switchTab('questionTab')">题目管理</button>
                <button onclick="switchTab('timeLimitTab')">限时设置</button>
                <button onclick="switchTab('answerTab')">答案管理</button>
            </div>

            <!-- 系统配置标签页 -->
            <div class="tab-content active" id="configTab">
                <h2>系统配置</h2>

                <!-- 语言配置 -->
                <div class="form-group">
                    <label>启用考试语言（最多4种）：</label>
                    <div class="checkbox-group" id="languageCheckbox">
                        <div class="checkbox-item"><input type="checkbox" id="lang_cpp" value="C++"> <label for="lang_cpp">C++</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="lang_python" value="Python"> <label for="lang_python">Python</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="lang_java" value="Java"> <label for="lang_java">Java</label></div>
                        <div class="checkbox-item"><input type="checkbox" id="lang_scratch" value="Scratch"> <label for="lang_scratch">Scratch</label></div>
                    </div>
                </div>

                <!-- 等级配置 -->
                <div class="form-group">
                    <label>启用考试等级（1-8级）：</label>
                    <div class="checkbox-group" id="levelCheckbox"></div>
                </div>

                <!-- 考试时间配置 -->
                <div class="form-group">
                    <label for="examStartTimeInput">考试开始时间：</label>
                    <input type="datetime-local" id="examStartTimeInput">
                </div>

                <!-- GitHub 配置 -->
                <div class="form-group" style="border-top:1px solid #ddd;padding-top:20px;margin-top:20px;">
                    <h3 style="margin-bottom:15px;">GitHub 自动同步配置</h3>
                    <div class="form-group">
                        <label for="githubToken">GitHub Token：</label>
                        <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx" value="ghp_your_token_here">
                        <small style="color:#666;">需要 repo 权限，不会明文显示</small>
                    </div>
                    <div class="form-group">
                        <label for="githubRepo">仓库名：</label>
                        <input type="text" id="githubRepo" value="xxy150310git.github.io">
                    </div>
                    <div class="form-group">
                        <label for="githubPath">文件路径：</label>
                        <input type="text" id="githubPath" value="questions.js">
                    </div>
                </div>

                <button class="btn-success" onclick="saveConfig()">保存系统配置</button>
                <button class="btn-warning" onclick="exportConfig()">导出配置（替换config.js）</button>
            </div>

            <!-- 题目管理标签页 -->
            <div class="tab-content" id="questionTab">
                <h2>题目管理（仅选择题/判断题）</h2>

                <!-- GitHub 同步状态 -->
                <div id="githubSyncStatus" style="margin-bottom:15px;padding:10px;background:#e7f3ff;border-radius:4px;display:none;">
                    <span id="syncStatusText">准备同步...</span>
                </div>

                <!-- 新增/编辑题目表单 -->
                <div class="form-group">
                    <label for="qLanguage">题目语言：</label>
                    <select id="qLanguage">
                        <option value="C++">C++</option>
                        <option value="Python">Python</option>
                        <option value="Java">Java</option>
                        <option value="Scratch">Scratch</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="qLevel">题目等级：</label>
                    <select id="qLevel">
                        <option value="1">1级</option>
                        <option value="2">2级</option>
                        <option value="3">3级</option>
                        <option value="4">4级</option>
                        <option value="5">5级</option>
                        <option value="6">6级</option>
                        <option value="7">7级</option>
                        <option value="8">8级</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="qType">题目类型：</label>
                    <select id="qType" onchange="toggleQuestionForm()">
                        <option value="选择题">选择题</option>
                        <option value="判断题">判断题</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="qTitle">题目标题：</label>
                    <input type="text" id="qTitle" placeholder="输入题目标题">
                </div>
                <div class="form-group">
                    <label for="qDesc">题目描述：</label>
                    <textarea id="qDesc" placeholder="输入题目详细描述"></textarea>
                </div>

                <!-- 选择题选项区域 -->
                <div class="form-group" id="optionsGroup">
                    <label>选择题选项：</label>
                    <div class="options-area" id="optionsArea">
                        <div class="option-input">
                            <input type="text" placeholder="选项1" class="option-text">
                            <button class="btn-danger" onclick="removeOption(this)" style="display:none;">-</button>
                        </div>
                        <div class="option-input">
                            <input type="text" placeholder="选项2" class="option-text">
                            <button class="btn-danger" onclick="removeOption(this)" style="display:none;">-</button>
                        </div>
                    </div>
                    <button class="btn-success" onclick="addOption()" style="margin-top:10px;">+ 添加选项</button>
                </div>

                <!-- 正确答案 -->
                <div class="form-group">
                    <label for="qCorrectAnswer">正确答案：</label>
                    <input type="text" id="qCorrectAnswer" placeholder="输入正确答案（选择题填选项内容/判断题填正确/错误）">
                </div>

                <div class="form-group">
                    <label for="qScore">题目分值：</label>
                    <input type="number" id="qScore" min="0" placeholder="输入题目分值">
                </div>

                <input type="hidden" id="qId">
                <div style="display:flex;gap:10px;">
                    <button class="btn-success" onclick="saveQuestion()" style="flex:2;">保存题目（自动同步到GitHub）</button>
                    <button class="btn-danger" onclick="resetQuestionForm()" style="flex:1;">清空表单</button>
                </div>

                <!-- 题目列表 -->
                <h3 style="margin-top:30px;">题目列表</h3>
                <table id="questionTable">
                    <thead>
                        <tr>
                            <th>语言</th>
                            <th>等级</th>
                            <th>类型</th>
                            <th>标题</th>
                            <th>分值</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="questionTableBody"></tbody>
                </table>
                <button class="btn-warning" onclick="syncFromGitHub()" style="margin-top:10px;">从GitHub重新加载题目</button>
            </div>

            <!-- 限时设置标签页（新增） -->
            <div class="tab-content" id="timeLimitTab">
                <h2>限时设置</h2>
                <p style="color:#666;margin-bottom:20px;">可以设置多个考试时间段，考生只能在指定时间内进入考试。</p>

                <!-- 新增限时规则表单 -->
                <div class="time-limit-group">
                    <h3 style="margin-bottom:15px;">新增限时规则</h3>
                    <div class="time-limit-row">
                        <input type="datetime-local" id="limitStartTime" style="flex:2;">
                        <span style="padding:0 10px;">至</span>
                        <input type="datetime-local" id="limitEndTime" style="flex:2;">
                    </div>
                    <div class="time-limit-row">
                        <select id="limitLanguage" style="flex:1;">
                            <option value="all">所有语言</option>
                            <option value="C++">C++</option>
                            <option value="Python">Python</option>
                            <option value="Java">Java</option>
                            <option value="Scratch">Scratch</option>
                        </select>
                        <select id="limitLevel" style="flex:1;">
                            <option value="all">所有等级</option>
                            <option value="1">1级</option>
                            <option value="2">2级</option>
                            <option value="3">3级</option>
                            <option value="4">4级</option>
                            <option value="5">5级</option>
                            <option value="6">6级</option>
                            <option value="7">7级</option>
                            <option value="8">8级</option>
                        </select>
                        <input type="text" id="limitDescription" placeholder="描述（如：第一场考试）" style="flex:2;">
                    </div>
                    <button class="btn-success" onclick="addTimeLimit()" style="width:auto;padding:10px 30px;">添加限时规则</button>
                </div>

                <!-- 限时规则列表 -->
                <h3 style="margin-top:30px;">当前限时规则</h3>
                <div id="timeLimitList"></div>

                <!-- 批量操作 -->
                <div style="margin-top:20px;display:flex;gap:10px;">
                    <button class="btn-warning" onclick="saveTimeLimits()">保存限时规则到GitHub</button>
                    <button class="btn-danger" onclick="clearAllTimeLimits()">清空所有规则</button>
                </div>
            </div>

            <!-- 答案管理标签页 -->
            <div class="tab-content" id="answerTab">
                <h2>答案管理</h2>

                <!-- 导入答案文件 -->
                <div class="upload-area">
                    <p>导入用户答案JS文件</p>
                    <input type="file" id="answerFileInput" accept=".js" onchange="importAnswerFile(this.files)">
                </div>

                <!-- 答案列表 -->
                <h3 style="margin-top:30px;">用户答案列表</h3>
                <table id="answerTable">
                    <thead>
                        <tr>
                            <th>考生姓名</th>
                            <th>考试语言</th>
                            <th>考试等级</th>
                            <th>提交时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="answerTableBody"></tbody>
                </table>

                <!-- 答案详情 -->
                <div id="answerDetail" style="margin-top:30px;display:none;">
                    <h3>答案详情</h3>
                    <div id="answerDetailContent"></div>
                    <button class="btn-success" style="margin-top:15px;" onclick="document.getElementById('answerDetail').style.display='none'">关闭详情</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== 全局变量 ====================
        let config = {};
        let questions = [];
        let answers = [];
        let timeLimits = []; // 新增：限时规则数组
        let currentTab = 'configTab';

        // GitHub 配置
        let githubConfig = {
            owner: 'xxy150310git',
            repo: 'xxy150310git.github.io',
            path: 'questions.js',
            token: 'ghp_your_token_here'
        };

        // ==================== 初始化 ====================
        // 页面加载时初始化等级复选框
        window.onload = function() {
            initLevelCheckboxDOM();
        };

        // 初始化等级复选框
        function initLevelCheckboxDOM() {
            const levelCheckboxEl = document.getElementById('levelCheckbox');
            levelCheckboxEl.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const checkboxItem = document.createElement('div');
                checkboxItem.className = 'checkbox-item';
                checkboxItem.innerHTML = `
                    <input type="checkbox" id="level_${i}" value="${i}">
                    <label for="level_${i}">${i}级</label>
                `;
                levelCheckboxEl.appendChild(checkboxItem);
            }
        }

        // ==================== 管理员登录 ====================
        function adminLogin() {
            const acc = document.getElementById('adminAccount').value.trim();
            const pwd = document.getElementById('adminPwd').value.trim();

            loadScript('config.js', () => {
                const adminAccounts = (window.ojConfig || {}).adminAccounts || [];
                const isValid = adminAccounts.some(item => item.account === acc && item.pwd === pwd);

                if (isValid) {
                    document.getElementById('loginArea').classList.remove('active');
                    document.getElementById('manageArea').classList.add('active');
                    initManageData();
                } else {
                    alert('账号或密码错误！');
                }
            });
        }

        // ==================== 初始化管理数据 ====================
        function initManageData() {
            // 加载配置
            loadScript('config.js', () => {
                config = window.ojConfig || {};
                initConfigForm();
                
                // 从 localStorage 加载限时规则
                const savedLimits = localStorage.getItem('gesp_time_limits');
                if (savedLimits) {
                    timeLimits = JSON.parse(savedLimits);
                }
                renderTimeLimitList();
            });

            // 加载题目
            loadQuestions();

            // 加载答案
            loadAnswers();

            // 读取 GitHub 配置
            const savedToken = localStorage.getItem('github_token');
            if (savedToken) {
                document.getElementById('githubToken').value = savedToken;
                githubConfig.token = savedToken;
            }
            document.getElementById('githubRepo').value = githubConfig.repo;
            document.getElementById('githubPath').value = githubConfig.path;
        }

        // ==================== 系统配置相关 ====================
        function initConfigForm() {
            // 初始化语言复选框
            const enabledLangs = config.enabledLanguages || [];
            ['lang_cpp', 'lang_python', 'lang_java', 'lang_scratch'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.checked = enabledLangs.includes(el.value);
            });

            // 初始化等级复选框
            const enabledLevels = config.enabledLevels || [];
            for (let i = 1; i <= 8; i++) {
                const levelEl = document.getElementById(`level_${i}`);
                if (levelEl) levelEl.checked = enabledLevels.includes(i);
            }

            // 初始化考试时间
            if (config.examStartTime) {
                const dt = new Date(config.examStartTime);
                if (!isNaN(dt.getTime())) {
                    const dtStr = dt.toISOString().slice(0, 16);
                    document.getElementById('examStartTimeInput').value = dtStr;
                }
            }
        }

        function saveConfig() {
            // 获取选中的语言
            const enabledLangs = [];
            ['lang_cpp', 'lang_python', 'lang_java', 'lang_scratch'].forEach(id => {
                const el = document.getElementById(id);
                if (el && el.checked) enabledLangs.push(el.value);
            });
            if (enabledLangs.length > 4) {
                alert('最多只能启用4种语言！');
                return;
            }

            // 获取选中的等级
            const enabledLevels = [];
            for (let i = 1; i <= 8; i++) {
                const el = document.getElementById(`level_${i}`);
                if (el && el.checked) enabledLevels.push(parseInt(el.value));
            }

            // 获取考试开始时间
            const startTimeInput = document.getElementById('examStartTimeInput').value;
            if (!startTimeInput) {
                alert('请选择考试开始时间！');
                return;
            }
            const startTime = startTimeInput.replace('T', ' ') + ':00';

            // 更新配置
            config.enabledLanguages = enabledLangs;
            config.enabledLevels = enabledLevels;
            config.examStartTime = startTime;

            // 保存 GitHub 配置
            const token = document.getElementById('githubToken').value.trim();
            if (token && token !== 'ghp_your_token_here') {
                localStorage.setItem('github_token', token);
                githubConfig.token = token;
            }
            githubConfig.repo = document.getElementById('githubRepo').value.trim();
            githubConfig.path = document.getElementById('githubPath').value.trim();

            alert('配置保存成功！请点击「导出配置」更新config.js文件');
        }

        function exportConfig() {
            const jsContent = `window.ojConfig = ${JSON.stringify(config, null, 2)};`;
            const blob = new Blob([jsContent], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'config.js';
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ 配置文件导出成功！');
        }

        // ==================== 限时规则相关（新增） ====================
        function addTimeLimit() {
            const startTime = document.getElementById('limitStartTime').value;
            const endTime = document.getElementById('limitEndTime').value;
            const language = document.getElementById('limitLanguage').value;
            const level = document.getElementById('limitLevel').value;
            const description = document.getElementById('limitDescription').value.trim() || '未命名规则';

            if (!startTime || !endTime) {
                alert('请填写完整的起止时间！');
                return;
            }

            if (new Date(endTime) <= new Date(startTime)) {
                alert('结束时间必须大于开始时间！');
                return;
            }

            const newLimit = {
                id: Date.now(),
                startTime: startTime,
                endTime: endTime,
                language: language,
                level: level,
                description: description,
                createdAt: new Date().toLocaleString()
            };

            timeLimits.push(newLimit);
            localStorage.setItem('gesp_time_limits', JSON.stringify(timeLimits));
            renderTimeLimitList();

            // 清空表单
            document.getElementById('limitStartTime').value = '';
            document.getElementById('limitEndTime').value = '';
            document.getElementById('limitLanguage').value = 'all';
            document.getElementById('limitLevel').value = 'all';
            document.getElementById('limitDescription').value = '';
        }

        function renderTimeLimitList() {
            const container = document.getElementById('timeLimitList');
            if (timeLimits.length === 0) {
                container.innerHTML = '<div class="no-data">暂无限时规则</div>';
                return;
            }

            // 按时间排序
            timeLimits.sort((a, b) => new Date(a.startTime) - new Date(b.startTime));

            let html = '';
            const now = new Date();

            timeLimits.forEach(limit => {
                const start = new Date(limit.startTime);
                const end = new Date(limit.endTime);
                
                let status = 'pending';
                let statusText = '未开始';
                let statusClass = 'status-pending';

                if (now >= start && now <= end) {
                    status = 'active';
                    statusText = '进行中';
                    statusClass = 'status-active';
                } else if (now > end) {
                    status = 'expired';
                    statusText = '已结束';
                    statusClass = 'status-expired';
                }

                const languageText = limit.language === 'all' ? '所有语言' : limit.language;
                const levelText = limit.level === 'all' ? '所有等级' : `${limit.level}级`;

                html += `
                    <div class="time-limit-item">
                        <div class="time-limit-header">
                            <h4>${limit.description}</h4>
                            <span class="status-badge ${statusClass}">${statusText}</span>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:10px 0;">
                            <div><strong>开始时间：</strong>${limit.startTime.replace('T', ' ')}</div>
                            <div><strong>结束时间：</strong>${limit.endTime.replace('T', ' ')}</div>
                            <div><strong>适用语言：</strong>${languageText}</div>
                            <div><strong>适用等级：</strong>${levelText}</div>
                        </div>
                        <div style="display:flex;gap:10px;justify-content:flex-end;">
                            <button class="btn-warning" onclick="editTimeLimit(${limit.id})" style="width:auto;padding:5px 15px;">编辑</button>
                            <button class="btn-danger" onclick="deleteTimeLimit(${limit.id})" style="width:auto;padding:5px 15px;">删除</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function deleteTimeLimit(id) {
            if (!confirm('确定删除这条限时规则？')) return;
            timeLimits = timeLimits.filter(limit => limit.id !== id);
            localStorage.setItem('gesp_time_limits', JSON.stringify(timeLimits));
            renderTimeLimitList();
        }

        function editTimeLimit(id) {
            const limit = timeLimits.find(l => l.id === id);
            if (!limit) return;

            document.getElementById('limitStartTime').value = limit.startTime;
            document.getElementById('limitEndTime').value = limit.endTime;
            document.getElementById('limitLanguage').value = limit.language;
            document.getElementById('limitLevel').value = limit.level;
            document.getElementById('limitDescription').value = limit.description;

            deleteTimeLimit(id); // 删除旧的，然后可以重新添加
        }

        function saveTimeLimits() {
            // 将限时规则保存到 GitHub（作为 timeLimits.js）
            const jsContent = `window.ojTimeLimits = ${JSON.stringify(timeLimits, null, 2)};`;
            const blob = new Blob([jsContent], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'timeLimits.js';
            a.click();
            URL.revokeObjectURL(url);
            
            alert('✅ 限时规则已导出为 timeLimits.js，请上传到 GitHub');
        }

        function clearAllTimeLimits() {
            if (!confirm('确定清空所有限时规则？')) return;
            timeLimits = [];
            localStorage.removeItem('gesp_time_limits');
            renderTimeLimitList();
        }

        // ==================== 题目管理相关（带 GitHub 同步） ====================
        function toggleQuestionForm() {
            const qType = document.getElementById('qType').value;
            const optionsGroup = document.getElementById('optionsGroup');
            optionsGroup.style.display = qType === '选择题' ? 'block' : 'none';
        }

        function addOption() {
            const optionsArea = document.getElementById('optionsArea');
            const optionCount = optionsArea.querySelectorAll('.option-input').length;
            if (optionCount >= 8) {
                alert('最多只能添加8个选项！');
                return;
            }

            const newOption = document.createElement('div');
            newOption.className = 'option-input';
            newOption.innerHTML = `
                <input type="text" placeholder="选项${optionCount+1}" class="option-text">
                <button class="btn-danger" onclick="removeOption(this)">-</button>
            `;
            optionsArea.appendChild(newOption);

            optionsArea.querySelectorAll('.option-input button').forEach(btn => {
                btn.style.display = 'block';
            });
        }

        function removeOption(el) {
            const optionsArea = document.getElementById('optionsArea');
            const optionCount = optionsArea.querySelectorAll('.option-input').length;
            if (optionCount <= 2) {
                alert('至少保留2个选项！');
                return;
            }
            el.parentElement.remove();
            
            optionsArea.querySelectorAll('.option-input input').forEach((input, index) => {
                input.placeholder = `选项${index+1}`;
            });
        }

        async function saveQuestion() {
            const language = document.getElementById('qLanguage').value;
            const level = parseInt(document.getElementById('qLevel').value);
            const type = document.getElementById('qType').value;
            const title = document.getElementById('qTitle').value.trim();
            const desc = document.getElementById('qDesc').value.trim();
            const correctAnswer = document.getElementById('qCorrectAnswer').value.trim();
            const score = parseInt(document.getElementById('qScore').value);
            const qId = parseInt(document.getElementById('qId').value || 0);

            if (!title || !desc || !correctAnswer || isNaN(score) || score < 0) {
                alert('请填写完整题目信息！');
                return;
            }

            const question = {
                language,
                level,
                id: qId || Date.now(),
                title,
                description: desc,
                type,
                correctAnswer,
                score
            };

            if (type === '选择题') {
                const options = [];
                document.querySelectorAll('.option-text').forEach(input => {
                    const val = input.value.trim();
                    if (val) options.push(val);
                });
                if (options.length < 2) {
                    alert('选择题至少需要2个选项！');
                    return;
                }
                question.options = options;
            }

            // 更新本地数据
            if (qId) {
                const index = questions.findIndex(q => q.id === qId);
                if (index !== -1) questions[index] = question;
            } else {
                questions.push(question);
            }

            window.ojQuestions = questions;
            renderQuestionTable();
            resetQuestionForm();

            // 同步到 GitHub
            await syncToGitHub();
        }

        async function syncToGitHub() {
            const statusDiv = document.getElementById('githubSyncStatus');
            const statusText = document.getElementById('syncStatusText');
            
            statusDiv.style.display = 'block';
            statusText.innerHTML = '⏳ 正在同步到 GitHub...';
            statusDiv.style.background = '#fff3cd';

            try {
                const token = document.getElementById('githubToken').value.trim();
                if (!token || token === 'ghp_your_token_here') {
                    throw new Error('请先在系统配置中填写 GitHub Token');
                }

                const repo = document.getElementById('githubRepo').value.trim();
                const path = document.getElementById('githubPath').value.trim();
                const owner = 'xxy150310git'; // 你的用户名

                // 生成新的文件内容
                const newContent = `window.ojQuestions = ${JSON.stringify(questions, null, 2)};`;
                
                // 获取当前文件的 SHA
                const getUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const getResponse = await fetch(getUrl, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                let sha = '';
                if (getResponse.ok) {
                    const fileData = await getResponse.json();
                    sha = fileData.sha;
                }

                // 准备上传数据
                const content = btoa(unescape(encodeURIComponent(newContent)));
                const putData = {
                    message: '更新题目 - ' + new Date().toLocaleString(),
                    content: content,
                    branch: 'main'
                };
                if (sha) putData.sha = sha;

                // 上传到 GitHub
                const putUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const putResponse = await fetch(putUrl, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putData)
                });

                if (!putResponse.ok) {
                    const error = await putResponse.json();
                    throw new Error(error.message || '同步失败');
                }

                statusText.innerHTML = '✅ 同步成功！题目已保存到 GitHub';
                statusDiv.style.background = '#d4edda';
                
                setTimeout(() => {
                    statusDiv.style.display = 'none';
                }, 3000);

            } catch (error) {
                statusText.innerHTML = `❌ 同步失败：${error.message}`;
                statusDiv.style.background = '#f8d7da';
                console.error('GitHub 同步错误:', error);
            }
        }

        async function syncFromGitHub() {
            if (!confirm('从 GitHub 重新加载题目会覆盖当前未保存的修改，确定吗？')) return;

            const statusDiv = document.getElementById('githubSyncStatus');
            const statusText = document.getElementById('syncStatusText');
            
            statusDiv.style.display = 'block';
            statusText.innerHTML = '⏳ 正在从 GitHub 加载题目...';
            statusDiv.style.background = '#fff3cd';

            try {
                const token = document.getElementById('githubToken').value.trim();
                if (!token || token === 'ghp_your_token_here') {
                    throw new Error('请先在系统配置中填写 GitHub Token');
                }

                const repo = document.getElementById('githubRepo').value.trim();
                const path = document.getElementById('githubPath').value.trim();
                const owner = 'xxy150310git';

                const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                const response = await fetch(url, {
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });

                if (!response.ok) {
                    throw new Error('获取文件失败');
                }

                const fileData = await response.json();
                const content = decodeURIComponent(escape(atob(fileData.content)));
                
                // 解析题目
                const match = content.match(/window\.ojQuestions\s*=\s*(\[.*?\]);/s);
                if (match) {
                    questions = eval('(' + match[1] + ')');
                    window.ojQuestions = questions;
                    renderQuestionTable();
                    
                    statusText.innerHTML = '✅ 加载成功！';
                    statusDiv.style.background = '#d4edda';
                } else {
                    throw new Error('无法解析题目数据');
                }

            } catch (error) {
                statusText.innerHTML = `❌ 加载失败：${error.message}`;
                statusDiv.style.background = '#f8d7da';
            }
        }

        function loadQuestions() {
            loadScript('questions.js', () => {
                questions = window.ojQuestions || [];
                renderQuestionTable();
            });
        }

        function renderQuestionTable() {
            const tbody = document.getElementById('questionTableBody');
            if (questions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">暂无题目</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            questions.forEach(q => {
                tbody.innerHTML += `
                    <tr>
                        <td>${q.language}</td>
                        <td>${q.level}级</td>
                        <td>${q.type}</td>
                        <td>${q.title}</td>
                        <td>${q.score}</td>
                        <td>
                            <button onclick="editQuestion(${q.id})">编辑</button>
                            <button class="btn-danger" onclick="delQuestion(${q.id})">删除</button>
                        </td>
                    </tr>
                `;
            });
        }

        function editQuestion(questionId) {
            const q = questions.find(item => item.id === questionId);
            if (!q) return;

            document.getElementById('qLanguage').value = q.language;
            document.getElementById('qLevel').value = q.level;
            document.getElementById('qType').value = q.type;
            document.getElementById('qTitle').value = q.title;
            document.getElementById('qDesc').value = q.description;
            document.getElementById('qCorrectAnswer').value = q.correctAnswer;
            document.getElementById('qScore').value = q.score;
            document.getElementById('qId').value = q.id;

            toggleQuestionForm();

            if (q.type === '选择题' && q.options) {
                const optionsArea = document.getElementById('optionsArea');
                optionsArea.innerHTML = '';
                q.options.forEach((option, index) => {
                    const newOption = document.createElement('div');
                    newOption.className = 'option-input';
                    newOption.innerHTML = `
                        <input type="text" placeholder="选项${index+1}" class="option-text" value="${option}">
                        <button class="btn-danger" onclick="removeOption(this)" ${index < 2 ? 'style="display:none;"' : ''}>-</button>
                    `;
                    optionsArea.appendChild(newOption);
                });
            }
        }

        async function delQuestion(questionId) {
            if (!confirm('确定删除该题目？')) return;

            questions = questions.filter(q => q.id !== questionId);
            window.ojQuestions = questions;
            renderQuestionTable();
            await syncToGitHub();
        }

        function resetQuestionForm() {
            document.getElementById('qLanguage').value = 'C++';
            document.getElementById('qLevel').value = 1;
            document.getElementById('qType').value = '选择题';
            document.getElementById('qTitle').value = '';
            document.getElementById('qDesc').value = '';
            document.getElementById('qCorrectAnswer').value = '';
            document.getElementById('qScore').value = '';
            document.getElementById('qId').value = '';

            const optionsArea = document.getElementById('optionsArea');
            optionsArea.innerHTML = `
                <div class="option-input">
                    <input type="text" placeholder="选项1" class="option-text">
                    <button class="btn-danger" onclick="removeOption(this)" style="display:none;">-</button>
                </div>
                <div class="option-input">
                    <input type="text" placeholder="选项2" class="option-text">
                    <button class="btn-danger" onclick="removeOption(this)" style="display:none;">-</button>
                </div>
            `;
            toggleQuestionForm();
        }

        // ==================== 答案管理相关 ====================
        function loadAnswers() {
            loadScript('answers.js', () => {
                answers = window.ojAnswers || [];
                renderAnswerTable();
            });
        }

        function renderAnswerTable() {
            const tbody = document.getElementById('answerTableBody');
            if (answers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">暂无用户答案</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            answers.forEach((ans, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${ans.username}</td>
                        <td>${ans.language}</td>
                        <td>${ans.level}级</td>
                        <td>${ans.submitTime}</td>
                        <td>
                            <button onclick="viewAnswer(${index})">查看详情</button>
                            <button class="btn-danger" onclick="delAnswer(${index})">删除</button>
                        </td>
                    </tr>
                `;
            });
        }

        function importAnswerFile(files) {
            if (!files || files.length === 0) return;

            const file = files[0];
            if (!file.name.endsWith('.js')) {
                alert('请上传JS格式的答案文件！');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const script = document.createElement('script');
                    script.text = e.target.result;
                    document.body.appendChild(script);

                    const userAnswer = window.ojUserAnswer;
                    if (!userAnswer || !userAnswer.username) {
                        alert('答案文件格式错误！');
                        return;
                    }

                    answers.push(userAnswer);
                    window.ojAnswers = answers;
                    exportAnswers();
                    renderAnswerTable();
                    alert(`✅ 成功导入${userAnswer.username}的答案！`);
                } catch (err) {
                    alert('导入失败：' + err.message);
                }
            };
            reader.readAsText(file);
        }

        function viewAnswer(index) {
            const ans = answers[index];
            if (!ans) return;

            let detailHtml = `
                <div><strong>考生姓名：</strong>${ans.username}</div>
                <div><strong>考试语言：</strong>${ans.language}</div>
                <div><strong>考试等级：</strong>${ans.level}级</div>
                <div><strong>提交时间：</strong>${ans.submitTime}</div>
                <div><strong>总题数：</strong>${ans.totalQuestions}</div>
                <div><strong>得分：</strong>${ans.score || 0}</div>
                <div style="margin-top:15px;"><strong>答题详情：</strong></div>
            `;

            for (const [qId, answer] of Object.entries(ans.answers)) {
                detailHtml += `
                    <div style="margin:10px 0;padding:10px;background:#f8f9fa;">
                        <div><strong>第${qId}题答案：</strong></div>
                        <div>${answer || '未作答'}</div>
                    </div>
                `;
            }

            document.getElementById('answerDetailContent').innerHTML = detailHtml;
            document.getElementById('answerDetail').style.display = 'block';
        }

        function delAnswer(index) {
            if (!confirm('确定删除该答案？')) return;
            answers.splice(index, 1);
            window.ojAnswers = answers;
            renderAnswerTable();
            exportAnswers();
        }

        function exportAnswers() {
            const jsContent = `window.ojAnswers = ${JSON.stringify(answers, null, 2)};`;
            const blob = new Blob([jsContent], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'answers.js';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==================== 通用工具函数 ====================
        function switchTab(tabId) {
            document.querySelectorAll('.tab-nav button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabId).classList.add('active');
            currentTab = tabId;

            if (tabId === 'questionTab') {
                loadQuestions();
                toggleQuestionForm();
            }
            if (tabId === 'answerTab') loadAnswers();
            if (tabId === 'timeLimitTab') renderTimeLimitList();
        }

        function loadScript(src, callback) {
            const oldScripts = document.querySelectorAll(`script[src*="${src}"]`);
            oldScripts.forEach(script => script.remove());

            const script = document.createElement('script');
            script.src = src + '?rand=' + Math.random();
            script.type = 'text/javascript';
            script.charset = 'UTF-8';
            script.onload = callback;
            script.onerror = () => alert(`加载${src}失败！请检查文件是否存在`);
            document.body.appendChild(script);
        }
    </script>
